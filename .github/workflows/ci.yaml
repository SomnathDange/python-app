name: ci

on:
  push:
    branches: [ main ]

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      -
        name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      -
        name: Set short SHA
        run: echo "SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-6)" >> $GITHUB_ENV

      -
        name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: sdange/python-app:${{ env.SHORT_SHA }}

  deploy:
    needs: docker
    runs-on: self-hosted
    steps:
      -
        name: Checkout code
        uses: actions/checkout@v4

      - 
        name: Set short SHA
        run: echo "SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-6)" >> $GITHUB_ENV

      - 
        name: Echo short SHA
        run: echo "Deploying with image tag ${{ env.SHORT_SHA }}"
